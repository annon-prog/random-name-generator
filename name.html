<!DOCTYPE html>
<html lang="en">
<head>
      <meta charset="UTF-8">
      <meta http-equiv="X-UA-Compatible" content="IE=edge">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Random name generator</title>
      <link rel="stylesheet" href="name.css">
</head>
<body>
      <div class="container">
            <h4>How many times would you like to generate (up to 10 times)</h4>
            <div class="form">
                  <input type="number" min="1" max="10"value="1" class="qty">
                  <button onclick="nameQty()">GENERATE</button>
           </div>
           <div class="nameBox">
            <span class="nameList">
                  CLICK ON GENERATE BUTTON
            </span>
           </div>
      </div>
      <script src="name.js"></script>
</body>
</html>
